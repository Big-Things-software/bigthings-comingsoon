<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Big Things — Coming Soon</title>
  <meta name="description" content="Big Things is on its way. Join the community and be first to know.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">


<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          black: '#060a10',
          btblue: '#2f89c5',
          blue: '#1e4e7a',
          white: '#f2f6f9',
        },
        fontFamily: {
          sans: ['Inter', 'sans-serif'],
          mono: ['"JetBrains Mono"', 'monospace'],
          heading: ['Montserrat', 'sans-serif'],
        },
        keyframes: {
          drift: {
            '0%,100%': { filter: 'hue-rotate(0deg)', transform: 'scale(1) translate(0,0)' },
            '50%': { filter: 'hue-rotate(8deg)', transform: 'scale(1.05) translate(2%,1%)' },
          },
          breathe1: {
            '0%,100%': { transform: 'translate(0,0) scale(1)' },
            '50%': { transform: 'translate(6vw,4vw) scale(1.25)' },
          },
          breathe2: {
            '0%,100%': { transform: 'translate(0,0) scale(1)' },
            '50%': { transform: 'translate(-5vw,-6vw) scale(1.2)' },
          },
          breathe3: {
            '0%,100%': { transform: 'translate(0,0) scale(1)' },
            '50%': { transform: 'translate(4vw,-3vw) scale(1.3)' },
          },
          blinkDot: {
            '0%,100%': { opacity: 1 },
            '50%': { opacity: 0.25 },
          },
        },
        animation: {
          drift: 'drift 26s ease-in-out infinite alternate',
          breathe1: 'breathe1 16s ease-in-out infinite',
          breathe2: 'breathe2 19s ease-in-out infinite',
          breathe3: 'breathe3 22s ease-in-out infinite',
          blinkDot: 'blinkDot 2.4s ease-in-out infinite',
        },
      },
    },
  }
</script>

</head>
<body class="bg-black text-white font-sans h-screen overflow-hidden flex items-center justify-center relative">

  <div class="fixed -inset-[10%] z-0 bg-black bg-[radial-gradient(circle_at_20%_30%,rgba(47,137,197,0.22),transparent_55%),radial-gradient(circle_at_80%_70%,rgba(111,195,232,0.16),transparent_55%),radial-gradient(circle_at_50%_100%,rgba(30,78,122,0.18),transparent_60%)] animate-drift motion-reduce:animate-none"></div>

  <div class="fixed -top-[8vw] -left-[8vw] z-[1] w-[70vw] h-[70vw] md:w-[46vw] md:h-[46vw] rounded-full bg-blue/60 blur-[80px] md:blur-[120px] mix-blend-screen will-change-transform animate-breathe1 motion-reduce:animate-none"></div>
  <div class="fixed -bottom-[10vw] -right-[6vw] z-[1] w-[64vw] h-[64vw] md:w-[40vw] md:h-[40vw] rounded-full bg-blue/45 blur-[80px] md:blur-[120px] mix-blend-screen will-change-transform animate-breathe2 motion-reduce:animate-none"></div>
  <div class="fixed bottom-[4vw] left-[8vw] z-[1] w-[56vw] h-[56vw] md:w-[34vw] md:h-[34vw] rounded-full bg-blue/60 blur-[80px] md:blur-[120px] mix-blend-screen will-change-transform animate-breathe3 motion-reduce:animate-none"></div>

  <div id="particles-js" class="fixed inset-0 z-[2]"></div>

  <div class="fixed inset-0 z-[3] pointer-events-none bg-[radial-gradient(ellipse_at_center,transparent_35%,rgba(5,5,8,0.55)_100%)]"></div>


  <script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>
<script>
  if (window.particlesJS) {
    particlesJS('particles-js', {
      particles: {
        number: { value: 70, density: { enable: true, value_area: 900 } },
        color: { value: '#ffffff' },
        shape: { type: 'circle' },
        opacity: { value: 0.35, random: true, anim: { enable: true, speed: 0.4, opacity_min: 0.05, sync: false } },
        size: { value: 2, random: true },
        line_linked: { enable: true, distance: 140, color: '#ffffff', opacity: 0.08, width: 1 },
        move: { enable: true, speed: 0.6, direction: 'none', random: true, straight: false, out_mode: 'out' }
      },
      interactivity: {
        detect_on: 'window',
        events: {
          onhover: { enable: true, mode: 'grab' },
          onclick: { enable: false },
          resize: true
        },
        modes: { grab: { distance: 160, line_linked: { opacity: 0.2 } } }
      },
      retina_detect: true
    });
  }
</script>

</body>
</html>
