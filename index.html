<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          black: '#060a10',
          btblue: '#2f89c5',
          blue: '#091826',
          white: '#f2f6f9',
        },
        fontFamily: {
          sans: ['Inter', 'sans-serif'],
          mono: ['"JetBrains Mono"', 'monospace'],
          heading: ['Montserrat', 'sans-serif'],
        },
        keyframes: {
          drift: {
            '0%,100%': { filter: 'hue-rotate(0deg)', transform: 'scale(1) translate(0,0)' },
            '50%': { filter: 'hue-rotate(8deg)', transform: 'scale(1.05) translate(2%,1%)' },
          },
          breathe1: {
            '0%,100%': { transform: 'translate(0,0) scale(1)' },
            '50%': { transform: 'translate(6vw,4vw) scale(1.25)' },
          },
          breathe2: {
            '0%,100%': { transform: 'translate(0,0) scale(1)' },
            '50%': { transform: 'translate(-5vw,-6vw) scale(1.2)' },
          },
          breathe3: {
            '0%,100%': { transform: 'translate(0,0) scale(1)' },
            '50%': { transform: 'translate(4vw,-3vw) scale(1.3)' },
          },
          blinkDot: {
            '0%,100%': { opacity: 1 },
            '50%': { opacity: 0.25 },
          },
        },
        animation: {
          drift: 'drift 26s ease-in-out infinite alternate',
          breathe1: 'breathe1 16s ease-in-out infinite',
          breathe2: 'breathe2 19s ease-in-out infinite',
          breathe3: 'breathe3 22s ease-in-out infinite',
          blinkDot: 'blinkDot 2.4s ease-in-out infinite',
        },
      },
    },
  }
</script>

  <div class="fixed -top-[8vw] -left-[8vw] z-[1] w-[70vw] h-[70vw] md:w-[46vw] md:h-[46vw] rounded-full bg-blue/60 blur-[80px] md:blur-[120px] mix-blend-screen will-change-transform animate-breathe1 motion-reduce:animate-none"></div>
  <div class="fixed -bottom-[10vw] -right-[6vw] z-[1] w-[64vw] h-[64vw] md:w-[40vw] md:h-[40vw] rounded-full bg-blue/45 blur-[80px] md:blur-[120px] mix-blend-screen will-change-transform animate-breathe2 motion-reduce:animate-none"></div>

    <p class="text-[clamp(0.95rem,1.6vw,1.15rem)] leading-[1.55] text-paper/60 max-w-[460px] mb-[clamp(2rem,4vw,2.8rem)]">

    </p>

  <footer class="relative, pb-[4vh] z-[5] text-center font-mono text-[0.68rem] tracking-[0.14em] uppercase text-paper/[0.28]">Copyright &copy; 2026 Big Things 501(c)(3). All Rights Reserved.</footer>


  <script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>
<script>
  if (window.particlesJS) {
    particlesJS('particles-js', {
      particles: {
        number: { value: 70, density: { enable: true, value_area: 900 } },
        color: { value: '#ffffff' },
        shape: { type: 'circle' },
        opacity: { value: 0.35, random: true, anim: { enable: true, speed: 0.4, opacity_min: 0.05, sync: false } },
        size: { value: 2, random: true },
        line_linked: { enable: true, distance: 140, color: '#ffffff', opacity: 0.08, width: 1 },
        move: { enable: true, speed: 0.6, direction: 'none', random: true, straight: false, out_mode: 'out' }
      },
      interactivity: {
        detect_on: 'window',
        events: {
          onhover: { enable: true, mode: 'grab' },
          onclick: { enable: false },
          resize: true
        },
        modes: { grab: { distance: 160, line_linked: { opacity: 0.2 } } }
      },
      retina_detect: true
    });
  }
</script>
