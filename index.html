<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Big Things — Coming Soon</title>
  <meta name="description" content="Big Things is on its way. Join the community and be first to know.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">


<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          black: '#060a10',
          btblue: '#2f89c5',
          blue1: '#6fc3e8',
          blue2: '#1e4e7a',
          white: '#f2f6f9',
        },
        fontFamily: {
          sans: ['Inter', 'sans-serif'],
          mono: ['"JetBrains Mono"', 'monospace'],
          heading: ['Montserrat', 'sans-serif'],
        },
        keyframes: {
          drift: {
            '0%,100%': { filter: 'hue-rotate(0deg)', transform: 'scale(1) translate(0,0)' },
            '50%': { filter: 'hue-rotate(8deg)', transform: 'scale(1.05) translate(2%,1%)' },
          },
          breathe1: {
            '0%,100%': { transform: 'translate(0,0) scale(1)' },
            '50%': { transform: 'translate(6vw,4vw) scale(1.25)' },
          },
          breathe2: {
            '0%,100%': { transform: 'translate(0,0) scale(1)' },
            '50%': { transform: 'translate(-5vw,-6vw) scale(1.2)' },
          },
          breathe3: {
            '0%,100%': { transform: 'translate(0,0) scale(1)' },
            '50%': { transform: 'translate(4vw,-3vw) scale(1.3)' },
          },
          blinkDot: {
            '0%,100%': { opacity: 1 },
            '50%': { opacity: 0.25 },
          },
        },
        animation: {
          drift: 'drift 26s ease-in-out infinite alternate',
          breathe1: 'breathe1 16s ease-in-out infinite',
          breathe2: 'breathe2 19s ease-in-out infinite',
          breathe3: 'breathe3 22s ease-in-out infinite',
          blinkDot: 'blinkDot 2.4s ease-in-out infinite',
        },
      },
    },
  }
</script>

</head>
<body class="bg-black text-paper font-sans h-screen overflow-hidden flex items-center justify-center relative">

  <div class="fixed -inset-[10%] z-0 bg-black bg-[radial-gradient(circle_at_20%_30%,rgba(47,137,197,0.22),transparent_55%),radial-gradient(circle_at_80%_70%,rgba(111,195,232,0.16),transparent_55%),radial-gradient(circle_at_50%_100%,rgba(30,78,122,0.18),transparent_60%)] animate-drift motion-reduce:animate-none"></div>

</body>
</html>
